apiVersion: v1
kind: Namespace
metadata:
  name: jade-leaf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: jade-leaf
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_HOST: "postgres-service.jade-leaf.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "jade_leaf_db"
  REDIS_HOST: "redis-service.jade-leaf.svc.cluster.local"
  REDIS_PORT: "6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: jade-leaf
  labels:
    app: tea-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tea-backend
  template:
    metadata:
      labels:
        app: tea-backend
    spec:
      containers:
      - name: spring-boot-app
        image: gcr.io/jade-leaf-production/tea-backend:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: backend-config
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secrets
              key: secret-key
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: jade-leaf
spec:
  selector:
    app: tea-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: jade-leaf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
